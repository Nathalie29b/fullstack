name: Full Stack Manual CI

on:
  workflow_dispatch:   # 👈 manual trigger

jobs:
  fullstack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ---------------- BACKEND ----------------
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Tests
        run: |
          cd backend
          npm test --if-present

      - name: Start Backend Server
        run: |
          cd backend
          npm start &
          sleep 5

      # ---------------- FRONTEND ----------------
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test --if-present

      - name: Build Frontend
        run: |
          cd frontend
          npm run build --if-present

      - name: Start Frontend
        run: |
          cd frontend
          npm start &
          sleep 5
